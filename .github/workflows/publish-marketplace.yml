name: Publish to VS Code Marketplace

on:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: publish-marketplace-master
  cancel-in-progress: false

jobs:
  publish:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      !contains(github.event.head_commit.message, '[skip ci]')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Проверка секрета VSCE_PAT
        run: |
          if [ -z "${{ secrets.VSCE_PAT }}" ]; then
            echo "::error::Добавьте секрет VSCE_PAT в Settings → Secrets and variables → Actions"
            exit 1
          fi

      - name: Установка зависимостей
        run: npm ci

      - name: Поднять minor-версию (шаблон 0.x.0)
        id: bump
        run: |
          npm version minor --no-git-tag-version
          echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Сборка
        run: npm run compile

      - name: Публикация в Marketplace
        run: npx @vscode/vsce publish -p "$VSCE_PAT"
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

      - name: Зафиксировать версию и тег в репозитории
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json
          git commit -m "chore: release v${VERSION} [skip ci]"
          git tag -a "v${VERSION}" -m "Release v${VERSION}"
          git pull --rebase origin master
          git push origin master
          git push origin "v${VERSION}"
        env:
          VERSION: ${{ steps.bump.outputs.version }}
